<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Live Predictions</title>
<style>
  :root { --bg:#0e1116; --card:#171c24; --line:#252c37; --txt:#e6e9ef; --mut:#8b95a5;
          --acc:#3fb950; --acc2:#58a6ff; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:24px 20px 8px; max-width:1100px; margin:0 auto; }
  h1 { margin:0 0 4px; font-size:24px; }
  .sub { color:var(--mut); font-size:13px; }
  main { max-width:1100px; margin:0 auto; padding:12px 20px 60px; }
  h2 { font-size:16px; margin:28px 0 12px; border-bottom:1px solid var(--line); padding-bottom:6px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .match-top { display:flex; justify-content:space-between; font-size:12px; color:var(--mut); margin-bottom:6px; }
  .teams { font-weight:600; margin-bottom:8px; }
  .bar { display:flex; height:22px; border-radius:5px; overflow:hidden; font-size:11px; }
  .bar span { display:flex; align-items:center; justify-content:center; color:#0b0e13; font-weight:600; }
  .h{background:var(--acc2);} .d{background:#6e7681;} .a{background:var(--acc);}
  .meta { display:flex; gap:14px; margin-top:8px; color:var(--mut); font-size:12px; flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  td,th { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--mut); font-weight:500; font-size:12px; }
  .pbar { background:var(--line); border-radius:4px; height:8px; position:relative; min-width:80px; }
  .pbar > i { position:absolute; left:0; top:0; bottom:0; background:var(--acc); border-radius:4px; }
  .pct { font-variant-numeric:tabular-nums; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media (max-width:720px){ .cols{grid-template-columns:1fr;} }
  .tag { font-size:11px; color:var(--warn); }
</style>
</head>
<body>
<header>
  <h1>⚽ World Cup 2026 — Predictions</h1>
  <div class="sub">Market-anchored ensemble · Dixon-Coles + ELO · Monte Carlo tournament sim.
    <span id="updated"></span></div>
</header>
<main>
  <div class="cols">
    <div>
      <h2>Title probability</h2>
      <table id="title"></table>
    </div>
    <div>
      <h2>Reach knockout (R32)</h2>
      <table id="r32"></table>
    </div>
  </div>
  <h2>Match predictions <span class="tag" id="mcount"></span></h2>
  <div class="grid" id="matches"></div>
  <p class="sub" style="margin-top:30px">
    Probabilities are model estimates, not betting advice. Open data; see the repo README.
  </p>
</main>
<script>
function pct(x){ return (x*100).toFixed(1)+'%'; }
function probTable(el, obj, limit){
  const rows = Object.entries(obj).slice(0, limit);
  const max = rows.length ? rows[0][1] : 1;
  el.innerHTML = '<tr><th>Team</th><th>Prob</th><th></th></tr>' + rows.map(([t,p])=>
    `<tr><td>${t}</td><td class="pct">${pct(p)}</td>
     <td style="width:45%"><div class="pbar"><i style="width:${(p/max*100).toFixed(0)}%"></i></div></td></tr>`).join('');
}
function matchCard(m){
  if(m.error) return '';
  const h=(m.p_home*100), d=(m.p_draw*100), a=(m.p_away*100);
  const top = (m.top_scorelines||[]).slice(0,3).map(s=>`${s.score} (${(s.p*100).toFixed(0)}%)`).join(' · ');
  return `<div class="card">
    <div class="match-top"><span>${m.date||''}</span><span>${m.city||''}</span></div>
    <div class="teams">${m.home} <span style="color:var(--mut)">vs</span> ${m.away}</div>
    <div class="bar">
      <span class="h" style="width:${h}%">${h.toFixed(0)}</span>
      <span class="d" style="width:${d}%">${d.toFixed(0)}</span>
      <span class="a" style="width:${a}%">${a.toFixed(0)}</span>
    </div>
    <div class="meta">
      <span>O2.5 ${pct(m.p_over_2_5)}</span>
      <span>BTTS ${pct(m.p_btts)}</span>
      <span>${top}</span>
    </div></div>`;
}
fetch('./data.json').then(r=>r.json()).then(d=>{
  document.getElementById('updated').textContent = '· updated '+(d.generated_at||'');
  const sim = d.simulation||{};
  probTable(document.getElementById('title'), sim.title_probability||{}, 16);
  probTable(document.getElementById('r32'), sim.reach_knockout_R32||{}, 16);
  const ms = (d.predictions||[]).filter(m=>!m.error);
  document.getElementById('mcount').textContent = ms.length+' fixtures';
  document.getElementById('matches').innerHTML = ms.map(matchCard).join('');
}).catch(e=>{
  document.getElementById('matches').innerHTML='<p class="sub">No data.json yet — run: predict --all --simulate then publish.</p>';
});
</script>
</body>
</html>
